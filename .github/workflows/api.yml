name: API Tests with Bruno

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  bruno-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Verify Bruno Installation
        run: bru --version

      - name: Show current directory
        run: pwd

      - name: Show repository structure
        run: |
          echo "============================"
          echo "Repository structure"
          echo "============================"
          find .

      - name: Show environments folder
        run: |
          echo "============================"
          echo "Environments folder"
          echo "============================"
          ls -la environments || echo "Folder environments does not exist"

      - name: Run Bruno Collection
        run: bru run --env Dev
